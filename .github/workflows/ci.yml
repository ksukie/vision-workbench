name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONNOUSERSITE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install locked base dependencies
        run: python -m pip install --require-hashes --requirement requirements-base.lock
      - name: Install pytest
        run: python -m pip install pytest==9.0.3
      - name: Install project
        run: python -m pip install --no-deps --editable .
      - name: Compile sources
        run: python -m compileall -q src tests scripts
      - name: Check version contract
        run: python scripts/check_version_contract.py
      - name: Run tests
        run: python -m pytest -q
      - name: Check Markdown links
        run: python scripts/check_markdown_links.py
