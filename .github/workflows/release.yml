name: Prepare release draft

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  PYTHONNOUSERSITE: "1"

jobs:
  python-distributions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux Qt runtime
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libegl1
      - name: Install tested base and build dependencies
        run: |
          python -m pip install --require-hashes --requirement requirements-base.lock
          python -m pip install build==1.3.0 pytest==9.0.3
      - name: Validate tagged source
        run: |
          python -W error -m compileall -q src tests scripts
          python scripts/check_version_contract.py --release
          python scripts/check_release_assets.py
          python -m pytest -q
          python scripts/check_markdown_links.py
      - name: Build wheel and source distribution
        run: python -m build
      - name: Smoke-test the installed wheel
        run: |
          python -m venv --system-site-packages build/release-smoke
          build/release-smoke/bin/python -m pip install --no-index --no-deps --force-reinstall dist/vision_workbench-*-py3-none-any.whl
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          build/release-smoke/bin/python -m vision_workbench.self_test --expected-version "$EXPECTED_VERSION" --expected-mode wheel --qt
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  windows-executable:
    needs: python-distributions
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tested base and EXE build dependencies
        run: |
          python -m pip install --require-hashes --requirement requirements-base.lock
          python -m pip install pyinstaller==6.16.0
      - name: Validate tagged source
        run: python scripts/check_version_contract.py --release
      - name: Build Windows base EXE
        run: python scripts/build_windows_base_exe.py
      - name: Smoke-test the frozen EXE
        shell: pwsh
        run: |
          $exe = Get-Item -LiteralPath 'dist/Vision-Workbench-win-x64.exe'
          if ($null -eq $exe) { throw 'Windows release EXE was not created.' }
          $expectedVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          $report = Join-Path $env:RUNNER_TEMP 'vision-workbench-exe-self-test.log'
          $process = Start-Process -FilePath $exe.FullName -ArgumentList @(
            '--vision-workbench-self-test',
            '--expected-version',
            $expectedVersion,
            '--qt',
            '--report',
            $report
          ) -WindowStyle Hidden -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            if (Test-Path -LiteralPath $report) { Get-Content -LiteralPath $report }
            throw "Windows release EXE self-test failed with exit code $($process.ExitCode)."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/Vision-Workbench-win-x64.exe
          if-no-files-found: error

  release-draft:
    needs: [python-distributions, windows-executable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-distributions"
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: dist
      - name: Generate and validate update manifest
        run: |
          PUBLISHED_AT="$(python -c 'from datetime import datetime, timezone; print(datetime.now(timezone.utc).isoformat(timespec="seconds"))')"
          python scripts/generate_update_manifest.py --published-at "$PUBLISHED_AT"
          PYTHONPATH=src python -c "import json; from pathlib import Path; from vision_workbench.update_service import _parse_manifest; _parse_manifest(json.loads(Path('dist/update-manifest.json').read_text(encoding='utf-8')))"
      - name: Create unpublished release draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/Vision-Workbench-win-x64.exe \
            dist/update-manifest.json \
            --draft \
            --generate-notes \
            --title "Vision Workbench $GITHUB_REF_NAME" \
            --verify-tag
